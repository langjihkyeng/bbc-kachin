<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBC Kachin | Sign up</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f5f5f5; }
    .box { max-width: 420px; margin: 8vh auto; background: #fff; border: 1px solid #e5e5e5; padding: 24px; }
    h1 { margin-top: 0; }
    input, button { width: 100%; margin-top: 10px; padding: 12px; font-size: 15px; }
    button { border: none; background: #b80000; color: #fff; font-weight: 700; cursor: pointer; }
    a { display: inline-block; margin-top: 14px; color: #444; }
  </style>
</head>
<body>
  <main class="box">
    <h1>Create Account</h1>
    <p>Register a newsroom account to publish and manage articles.</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="signUp()">Sign Up</button>
    <a href="index.html">← Back to homepage</a>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB3cKEguln5V4qIcTfLlq43GI8vHM1zU1w",
      authDomain: "bbc-kachin.firebaseapp.com",
      projectId: "bbc-kachin",
      appId: "1:756077088599:web:3337d83aec2d9d55baf812"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signUp = () => {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      createUserWithEmailAndPassword(auth, email, pass)
        .then(() => {
          alert('Welcome! Account created.');
          window.location.href = 'index.html';
        })
        .catch((error) => alert(error.message));
    };
  </script>
</body>
</html>
